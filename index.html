<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Photo Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="brand-rolex">
    <main class="wrap">

      <div class="tab-bar">
        <button class="tab active" data-brand="rolex">Rolex</button>
        <button class="tab" data-brand="breitling">Breitling</button>
        <button class="tab" data-brand="tudor">Tudor</button>
      </div>

      <form id="searchForm" class="search">
        <input
          id="refInput"
          type="text"
          placeholder="Search by ref# or collection"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="submit">Search</button>
      </form>

      <div id="status" class="status"></div>

      <div id="variants" class="variants hidden"></div>

      <section id="detail" class="detail hidden">
        <div class="detail-grid">

          <!-- Rolex: single preview + thumbs -->
          <div class="preview-col rolex-only">
            <img id="previewImg" class="preview" alt="preview" />
            <div id="thumbs" class="thumbs"></div>
            <p class="hint">Click an image to download it individually.</p>
          </div>

          <!-- Breitling: image grid -->
          <div id="breitlingImages" class="breitling-images breitling-only"></div>

          <!-- Tudor: single preview + thumbs -->
          <div class="preview-col tudor-only">
            <img id="tudorPreviewImg" class="preview" alt="preview" />
            <div id="tudorThumbs" class="thumbs"></div>
            <p class="hint">Click an image to download it individually.</p>
          </div>

          <div class="detail-info">
            <div class="title-row">
              <h2 id="detailTitle"></h2>
              <p id="detailCase"></p>
            </div>

            <!-- Rolex: download options -->
            <div class="rolex-only">
              <p class="options-hint">Check all that apply then click download</p>
              <div class="options">
                <label class="option"><input type="checkbox" id="optStaticWeb" checked /> 5 Static — JPG</label>
                <label class="option"><input type="checkbox" id="optStaticOrig" /> 5 Static — High quality PNG</label>
                <div id="opt360Group" class="hidden">
                  <label class="option"><input type="checkbox" id="opt360_64" /> 360° — 64 frames</label>
                  <label class="option"><input type="checkbox" id="opt360_250" /> 360° — 250 frames</label>
                </div>
              </div>
              <button id="downloadBtn" type="button">Download ZIP</button>
              <div id="progress" class="progress hidden">
                <div class="progress-bar">
                  <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="progressLabel" class="progress-label"></div>
              </div>
            </div>

            <!-- Breitling: right-click hint -->
            <p class="breitling-only breitling-hint">Right-click any image to save.</p>

            <!-- Tudor: download options -->
            <div class="tudor-only">
              <p class="options-hint">Check all that apply then click download</p>
              <div class="options">
                <label class="option"><input type="checkbox" id="tudorOptWeb" checked /> Images — JPG</label>
                <label class="option"><input type="checkbox" id="tudorOptOrig" /> Images — Original PNG</label>
              </div>
              <button id="tudorDownloadBtn" type="button">Download ZIP</button>
              <div id="tudorProgress" class="progress hidden">
                <div class="progress-bar">
                  <div id="tudorProgressFill" class="progress-fill"></div>
                </div>
                <div id="tudorProgressLabel" class="progress-label"></div>
              </div>
            </div>

            <div id="specs" class="specs hidden"></div>
          </div>

        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
